project_id = "boamec"

[api]
enabled = true
schemas = ["public", "storage"]
extra_search_path = ["public"]
max_rows = 1000

[auth]
enabled = true
site_url = "https://app.boamec.com.br"
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:8080",
  "https://*.vercel.app"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[storage]
enabled = true
file_size_limit = "10MiB"

[db]
major_version = 15
